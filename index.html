<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchmaking de Habilidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4 text-center">🤝 Plataforma de Matchmaking de Habilidades</h1>

        <!-- Formulário -->
        <form id="registerForm" class="card p-4 mb-4 shadow-sm">
            <div class="mb-3">
                <label for="name" class="form-label">Seu nome</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="skills" class="form-label">Suas habilidades (separe por vírgula)</label>
                <input type="text" id="skills" class="form-control" placeholder="Ex: Python, SQL, JavaScript">
            </div>
            <div class="mb-3">
                <label for="lookingFor" class="form-label">O que você procura (separe por vírgula)</label>
                <input type="text" id="lookingFor" class="form-control" placeholder="Ex: Dados, Carreira, Mentoria">
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>

        <!-- Lista de usuários -->
        <h3>👤 Usuários cadastrados</h3>
        <div id="usersList" class="mb-4"></div>

        <!-- Matches -->
        <h3>✨ Matches encontrados</h3>
        <div id="matchesList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
